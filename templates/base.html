<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PiggyBank - Twój Tracker Celów Oszczędnościowych</title>
    <!-- Dołączenie Tailwind CSS z sieci CDN w celach demonstracyjnych i projektowych -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 font-sans text-slate-800 min-h-screen flex flex-col">

    <!-- Nawigacja główna -->
    <nav class="bg-indigo-600 text-white shadow-md">
        <div class="max-w-5xl mx-auto px-4 py-3 flex justify-between items-center">
            <a href="{{ url_for('index') }}" class="text-xl font-bold tracking-tight flex items-center space-x-2">
                <span>🐷 PiggyBank</span>
            </a>
        </div>
    </nav>

    <!-- Kontener główny aplikacji -->
    <main class="flex-grow max-w-5xl w-full mx-auto px-4 py-6">
        
        <!-- Obsługa komunikatów Flash systemowych -->
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <div class="mb-6 space-y-2">
                    {% for category, message in messages %}
                        <div class="p-4 rounded-lg text-sm font-medium {% if category == 'success' %} bg-green-100 text-green-800 border-l-4 border-green-500 {% elif category == 'error' %} bg-red-100 text-red-800 border-l-4 border-red-500 {% else %} bg-blue-100 text-blue-800 border-l-4 border-blue-500 {% endif %}">
                            {{ message }}
                        </div>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}

        <!-- Główny podmieniany blok treści -->
        {% block content %}{% endblock %}
    </main>

    <!-- Stopka autorska -->
    <footer class="bg-slate-800 text-slate-400 py-4 border-t border-slate-700 text-center text-xs">
        <p>&copy; 2026 PiggyBank Małgorzata Plewka.</p>
    </footer>

</body>
</html>
