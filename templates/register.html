{% extends 'base.html' %}

{% block content %}
<div style="max-width: 400px; margin: 50px auto; padding: 30px; background: white; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
    <h2 style="text-align: center; color: #2c3e50; margin-bottom: 20px;">Załóż darmowe konto</h2>
    <form method="POST" action="{{ url_for('register') }}">
        <div style="margin-bottom: 15px;">
            <label style="display: block; margin-bottom: 5px; font-weight: bold;">Wybierz login</label>
            <input type="text" name="username" required style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px;">
        </div>
        <div style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 5px; font-weight: bold;">Wybierz bezpieczne hasło</label>
            <input type="password" name="password" required style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px;">
        </div>
        <button type="submit" style="width: 100%; padding: 12px; background: #3498db; border: none; color: white; font-weight: bold; border-radius: 4px; cursor: pointer;">Zarejestruj się</button>
    </form>
    <p style="text-align: center; margin-top: 20px; font-size: 0.9em;">Masz już konto? <a href="{{ url_for('login') }}" style="color: #2ecc71; text-decoration: none; font-weight: bold;">Zaloguj się</a></p>
</div>
{% endblock %}
